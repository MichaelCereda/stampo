name: Update Homebrew Formula
on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.CICD_GITHUB_TOKEN }}

      - name: Get release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute SHA-256
        env:
          GH_TOKEN: ${{ secrets.CICD_GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p /tmp/brew-assets

          for asset in \
            ring-cli-Darwin-aarch64.tar.gz \
            ring-cli-Darwin-x86_64.tar.gz \
            ring-cli-Linux-aarch64-musl.tar.gz \
            ring-cli-Linux-x86_64-musl.tar.gz; do
            echo "Downloading $asset..."
            gh release download "$tag" --pattern "$asset" --dir /tmp/brew-assets
          done

          {
            echo "sha_darwin_arm64=$(sha256sum /tmp/brew-assets/ring-cli-Darwin-aarch64.tar.gz | awk '{print $1}')"
            echo "sha_darwin_x86_64=$(sha256sum /tmp/brew-assets/ring-cli-Darwin-x86_64.tar.gz | awk '{print $1}')"
            echo "sha_linux_arm64=$(sha256sum /tmp/brew-assets/ring-cli-Linux-aarch64-musl.tar.gz | awk '{print $1}')"
            echo "sha_linux_x86_64=$(sha256sum /tmp/brew-assets/ring-cli-Linux-x86_64-musl.tar.gz | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"
        id: shas

      - name: Generate formula
        run: |
          cat > Formula/ring-cli.rb << 'EOF'
          class RingCli < Formula
            desc "Generate CLIs from YAML configs and OpenAPI specs"
            homepage "https://github.com/MichaelCereda/ring-cli"
            version "__VERSION__"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/MichaelCereda/ring-cli/releases/download/v#{version}/ring-cli-Darwin-aarch64.tar.gz"
                sha256 "__SHA_DARWIN_ARM64__"
              else
                url "https://github.com/MichaelCereda/ring-cli/releases/download/v#{version}/ring-cli-Darwin-x86_64.tar.gz"
                sha256 "__SHA_DARWIN_X86_64__"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/MichaelCereda/ring-cli/releases/download/v#{version}/ring-cli-Linux-aarch64-musl.tar.gz"
                sha256 "__SHA_LINUX_ARM64__"
              else
                url "https://github.com/MichaelCereda/ring-cli/releases/download/v#{version}/ring-cli-Linux-x86_64-musl.tar.gz"
                sha256 "__SHA_LINUX_X86_64__"
              end
            end

            def install
              bin.install "ring-cli"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/ring-cli --version")
            end
          end
          EOF

          # Fix indentation from heredoc
          sed -i 's/^          //' Formula/ring-cli.rb

          # Substitute placeholders
          sed -i "s/__VERSION__/${{ steps.version.outputs.version }}/" Formula/ring-cli.rb
          sed -i "s/__SHA_DARWIN_ARM64__/${{ steps.shas.outputs.sha_darwin_arm64 }}/" Formula/ring-cli.rb
          sed -i "s/__SHA_DARWIN_X86_64__/${{ steps.shas.outputs.sha_darwin_x86_64 }}/" Formula/ring-cli.rb
          sed -i "s/__SHA_LINUX_ARM64__/${{ steps.shas.outputs.sha_linux_arm64 }}/" Formula/ring-cli.rb
          sed -i "s/__SHA_LINUX_X86_64__/${{ steps.shas.outputs.sha_linux_x86_64 }}/" Formula/ring-cli.rb

      - name: Commit and push updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ring-cli.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update Homebrew formula for v${{ steps.version.outputs.version }}"
          git push
