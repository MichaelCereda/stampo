name: Tests and release
on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

# Prevent fork PRs from accessing secrets or running expensive builds
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CRATE_NAME: ring-cli
  RUST_BACKTRACE: 1
jobs:
  test:
    name: ${{ matrix.platform.os_name }} with rust ${{ matrix.toolchain }}
    runs-on: ${{ matrix.platform.os }}
    # Only run full matrix on push or same-repo PRs (not fork PRs)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write  # needed for softprops/action-gh-release on tag pushes
    strategy:
      fail-fast: false
      matrix:
        platform:
          # -- Linux --
          - os_name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: ring-cli
            name: ring-cli-Linux-x86_64-musl.tar.gz
          - os_name: Linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            bin: ring-cli
            name: ring-cli-Linux-aarch64-musl.tar.gz
            skip_tests: true
          - os_name: Linux-arm
            os: ubuntu-latest
            target: arm-unknown-linux-musleabi
            bin: ring-cli
            name: ring-cli-Linux-arm-musl.tar.gz
            skip_tests: true
          # -- macOS --
          - os_name: macOS-x86_64
            os: macOS-latest
            target: x86_64-apple-darwin
            bin: ring-cli
            name: ring-cli-Darwin-x86_64.tar.gz
          - os_name: macOS-aarch64
            os: macOS-latest
            target: aarch64-apple-darwin
            bin: ring-cli
            name: ring-cli-Darwin-aarch64.tar.gz
            skip_tests: true
          # -- Windows --
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: ring-cli.exe
            name: ring-cli-Windows-x86_64.zip
          - os_name: Windows-aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            bin: ring-cli.exe
            name: ring-cli-Windows-aarch64.zip
            skip_tests: true
        toolchain:
          - stable
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          key: "v2"
      - name: Configure Git
        run: |
          git config --global user.email "jdoe@example.com"
          git config --global user.name "J. Doe"
      - name: Install musl-tools on Linux
        run: sudo apt-get update --yes && sudo apt-get install --yes musl-tools
        if: contains(matrix.platform.name, 'musl')
      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: "build"
          target: ${{ matrix.platform.target }}
          toolchain: ${{ matrix.toolchain }}
          args: "--locked --release"
          strip: true
      - name: Run tests
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: "test"
          target: ${{ matrix.platform.target }}
          toolchain: ${{ matrix.toolchain }}
          args: "--locked --release"
        if: ${{ !matrix.platform.skip_tests }}
      - name: Package as archive
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          if [[ "${{ matrix.platform.os }}" == "windows-latest" ]]; then
            7z a ../../../${{ matrix.platform.name }} ${{ matrix.platform.bin }}
          else
            tar czvf ../../../${{ matrix.platform.name }} ${{ matrix.platform.bin }}
          fi
          cd -
        if: |
          matrix.toolchain == 'stable' &&
          ( startsWith( github.ref, 'refs/tags/v' ) ||
            github.ref == 'refs/tags/test-release' )
      - name: Publish release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ring-cli-${{ matrix.platform.os_name }}
          path: "ring-cli-*"
        if: matrix.toolchain == 'stable' && github.ref == 'refs/tags/test-release'
      - name: Generate SHA-256
        run: shasum -a 256 ${{ matrix.platform.name }}
        if: |
          matrix.toolchain == 'stable' &&
          matrix.platform.os == 'macOS-latest' &&
          ( startsWith( github.ref, 'refs/tags/v' ) ||
            github.ref == 'refs/tags/test-release' )
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: "ring-cli*"
        if: matrix.toolchain == 'stable' && startsWith( github.ref, 'refs/tags/v' )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Lightweight check for fork PRs — build and test on one platform only
  pr-check:
    name: PR check (Linux-x86_64)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          key: "pr-check"
      - name: Configure Git
        run: |
          git config --global user.email "jdoe@example.com"
          git config --global user.name "J. Doe"
      - name: Install musl-tools
        run: sudo apt-get update --yes && sudo apt-get install --yes musl-tools
      - name: Build
        run: cargo build --locked --release --target x86_64-unknown-linux-musl
      - name: Test
        run: cargo test --locked --release --target x86_64-unknown-linux-musl

  shell-completion-tests:
    name: Shell completions (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Only run for pushes and same-repo PRs (not fork PRs)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          key: "shell-tests"
      - name: Configure Git
        run: |
          git config --global user.email "jdoe@example.com"
          git config --global user.name "J. Doe"
      - name: Install shells (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fish zsh
      - name: Install shells (macOS)
        if: runner.os == 'macOS'
        run: brew install fish
      - name: Run live shell completion tests
        run: cargo test --test integration test_live_shell -- --nocapture
